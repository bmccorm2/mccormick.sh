# To bring up an environment, first define it: export ENV=dev
# DEV - Next bring up the environment with its respective yml file: docker-compose up

version: '3.7'

services:
  postfixadmin:
    container_name: postfixadmin
    build: ./postfixadmin
    restart: on-failure
    hostname: postfixadmin
    volumes:
      - /opt/certs:/etc/certs:ro
    env_file:
      - env/postfixadmin.env
    networks:
      - infra

  mail:
    build: ./mail
    container_name: mail
    hostname: mail
    dns: 1.1.1.1
    volumes:
      - /var/log:/var/log
      - /opt/certs:/etc/certs
      - /opt/vmail:/opt/vmail
    env_file:
      - env/mail.env
    ports:
      - '25:25'
      - '465:465'
      - '993:993'
      - '4190:4190'
    networks:
      - infra

  snappymail:
    image: djmaze/snappymail
    container_name: snappymail
    volumes:
      - /opt/snappymail:/var/lib/snappymail
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - env/snappymail.env
    depends_on:
      - mail
    networks:
      - infra

  vault:
    container_name: vault
    image: vaultwarden/server:alpine
    env_file:
      - env/vault.${ENV}.env
    volumes:
      - /opt/vault:/data
      - /etc/localtime:/etc/localtime:ro
    restart: always
    networks:
      - infra

  pihole:
    container_name: pihole
    hostname: pihole
    image: pihole/pihole:latest
    ports:
      - '53:53/tcp'
      - '53:53/udp'
    env_file:
      - env/pihole.${ENV}.env
    volumes:
      - /opt/pihole:/etc/pihole
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    networks:
      infra:
        ipv4_address: 172.19.0.13

  # unbound:
  #   build: ./unbound
  #   container_name: unbound
  #   restart: unless-stopped
  #   networks:
  #     infra:
  #       ipv4_address: 172.19.0.14

  vpn:
    image: linuxserver/wireguard
    container_name: vpn
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    env_file:
      - env/vpn.${ENV}.env
    volumes:
      - /opt/vpn:/config
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 51820:51820/udp
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    networks:
      - infra
    restart: unless-stopped

  nextcloud:
    container_name: nextcloud
    image: nextcloud:fpm-alpine
    volumes:
      - /opt/nextcloud:/var/www/html
      - /etc/localtime:/etc/localtime:ro
    restart: always
    env_file:
      - env/nextcloud.${ENV}.env
    networks:
      - infra

  nc-web:
    image: nginx:alpine-slim
    container_name: nc-web
    restart: always
    env_file:
      - env/nc-web.${ENV}.env
    volumes:
      - ./nc-web/nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/nextcloud:/var/www/html:ro
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - nextcloud
    networks:
      - infra

networks:
  infra:
    external: true
