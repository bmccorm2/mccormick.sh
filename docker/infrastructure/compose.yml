# To bring up an environment, first define it: export ENV=dev
# DEV - Next bring up the environment with its respective yml file: docker-compose up

services:
  proxy:
    image: nginxproxy/nginx-proxy:alpine
    container_name: proxy
    restart: always
    env_file:
      - env/proxy.env
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - /opt/certs:/etc/nginx/certs:ro
      - /opt/html:/usr/share/nginx/html
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - /opt/docker/infrastructure/proxy/uploadsize.conf:/etc/nginx/conf.d/uploadsize.conf:ro
      - /opt/docker/infrastructure/proxy/vhost.d:/etc/nginx/vhost.d:ro
      - /opt/log/nginx:/var/log/nginx:rw
    networks:
      - docker-net

  ssl:
    image: nginxproxy/acme-companion
    container_name: ssl
    depends_on:
      - proxy
    volumes:
      - /opt/certs:/etc/nginx/certs:rw
      - /opt/html:/usr/share/nginx/html
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/acme:/etc/acme.sh
    env_file:
      - env/ssl.env
    networks:
      - docker-net

  db:
    container_name: db
    image: postgres:18.1-alpine
    restart: on-failure
    env_file:
      - env/db.env
    volumes:
      - /opt/db:/var/lib/postgresql
    networks:
      - docker-net

  redis:
    image: redis:alpine
    container_name: redis
    volumes:
      - /opt/redis:/data
    environment:
      - TZ=America/Denver
    restart: always
    networks:
      - docker-net

  mail.fl_cert:
    build: ./mail.fl_cert
    container_name: mail.fl_cert
    depends_on:
      - ssl
    env_file:
      - env/mail.fl_cert.env
    networks:
      - docker-net

  cron:
    container_name: cron
    build: ./cron
    environment:
      - TZ=America/Denver
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - docker-net

networks:
  docker-net:
    name: docker-net
    ipam:
      driver: default
      config:
        - subnet: '172.19.1.0/27'
