server:
    interface: 127.0.0.1
    port: 53

    # allow localhost
    access-control: 127.0.0.0/8 allow

    # basic privacy / hygiene
    hide-identity: yes
    hide-version: yes
    qname-minimisation: yes

    # performance
    prefetch: yes
    rrset-roundrobin: yes
    cache-min-ttl: 300
    cache-max-ttl: 86400

    # security
    harden-glue: yes
    harden-dnssec-stripped: yes
    use-caps-for-id: yes

    # logging (off by default)
    verbosity: 0